<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rework Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2332;
    --border: #2a2f42;
    --text: #e8eaf0;
    --muted: #8892a4;
    --accent: #4f8ef7;
    --green: #2dd4a0;
    --red: #f05b5b;
    --amber: #f5a623;
    --purple: #9b7ff4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; line-height: 1.5; }

  .header { padding: 20px 28px 0; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header-left h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .header-left .sub { color: var(--muted); font-size: 12px; margin-top: 3px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .month-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; font-size: 13px; font-weight: 500; color: var(--accent); }
  .refresh-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; font-size: 12px; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all .15s; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn svg { width: 13px; height: 13px; }
  .last-updated { font-size: 11px; color: var(--muted); }
  .divider { height: 1px; background: var(--border); margin: 18px 28px; }

  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 0 28px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; position: relative; overflow: hidden; }
  .kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .kpi.blue::before { background: var(--accent); }
  .kpi.green::before { background: var(--green); }
  .kpi.red::before { background: var(--red); }
  .kpi.amber::before { background: var(--amber); }
  .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .kpi-value { font-size: 28px; font-weight: 600; line-height: 1; }
  .kpi.blue .kpi-value { color: var(--accent); }
  .kpi.green .kpi-value { color: var(--green); }
  .kpi.red .kpi-value { color: var(--red); }
  .kpi.amber .kpi-value { color: var(--amber); }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 5px; }

  .ops-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px 28px 0; }
  .ops-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; gap: 16px; }
  .ops-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ops-icon.purple { background: rgba(155,127,244,.15); color: var(--purple); }
  .ops-icon.teal { background: rgba(45,212,160,.15); color: var(--green); }
  .ops-icon svg { width: 18px; height: 18px; stroke: currentColor; }
  .ops-info .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .ops-info .value { font-size: 22px; font-weight: 600; margin-top: 2px; }
  .ops-info.purple .value { color: var(--purple); }
  .ops-info.teal .value { color: var(--green); }
  .ops-info .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px 28px 0; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
  .card-title { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; }

  .wtable { width: 100%; border-collapse: collapse; font-size: 12px; }
  .wtable th { text-align: left; padding: 0 8px 8px; color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); }
  .wtable th:not(:first-child) { text-align: right; }
  .wtable td { padding: 9px 8px; border-bottom: 1px solid rgba(42,47,66,.5); color: var(--muted); }
  .wtable td:first-child { color: var(--text); font-weight: 500; }
  .wtable td:not(:first-child) { text-align: right; }
  .wtable tr:last-child td { border-bottom: none; }
  .hi { color: var(--green) !important; font-weight: 500; }
  .lo { color: var(--red) !important; font-weight: 500; }
  .wa { color: var(--amber) !important; font-weight: 500; }
  .badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; }
  .badge-g { background: rgba(45,212,160,.12); color: var(--green); }
  .badge-r { background: rgba(240,91,91,.12); color: var(--red); }
  .badge-a { background: rgba(245,166,35,.12); color: var(--amber); }
  .badge-b { background: rgba(79,142,247,.12); color: var(--accent); }

  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .bar-label { font-size: 12px; color: var(--muted); flex: 0 0 190px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .bar-val { font-size: 12px; color: var(--text); font-weight: 500; min-width: 24px; text-align: right; }

  .atable { width: 100%; border-collapse: collapse; font-size: 12px; }
  .atable th { text-align: left; padding: 0 8px 8px; color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); }
  .atable th:not(:first-child) { text-align: right; }
  .atable td { padding: 8px; border-bottom: 1px solid rgba(42,47,66,.5); color: var(--muted); }
  .atable td:first-child { color: var(--text); }
  .atable td:not(:first-child) { text-align: right; }
  .atable tr:last-child td { border-bottom: none; }
  .rate-bar { display: flex; align-items: center; justify-content: flex-end; gap: 6px; }
  .rate-track { width: 60px; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .rate-fill { height: 100%; border-radius: 3px; }

  .chart-wrap { position: relative; height: 200px; }

  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; gap: 16px; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 13px; }
  .error-box { margin: 40px 28px; background: rgba(240,91,91,.08); border: 1px solid rgba(240,91,91,.3); border-radius: 10px; padding: 20px; color: var(--red); font-size: 13px; }
  .footer { padding: 20px 28px; color: var(--muted); font-size: 11px; text-align: center; border-top: 1px solid var(--border); margin-top: 20px; }

  @media (max-width: 900px) {
    .kpi-row { grid-template-columns: 1fr 1fr; }
    .grid-2, .ops-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 500px) {
    .kpi-row { grid-template-columns: 1fr; }
    .header, .kpi-row, .ops-row, .grid-2, .divider { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="loading"><div class="spinner"></div><div class="loading-text">Fetching live data...</div></div>
</div>
<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz5waICFvJKIRRwOWwh-8VkokRdS4yhS9wv3SM2slQShGl0scb0abArZByuc_FmRRgB/exec';

// ── FETCH ────────────────────────────────────────────────────────────────────
// Apps Script redirects to a googleusercontent.com URL.
// Using no-cors gives an opaque response we can't read.
// Solution: use a JSONP-style callback that Apps Script supports natively.
function fetchData(month, year) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now();
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('Request timed out after 15s'));
    }, 15000);

    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = function(data) {
      cleanup();
      resolve(data);
    };

    script.onerror = () => { cleanup(); reject(new Error('Script load failed — check SCRIPT_URL')); };
    script.src = `${SCRIPT_URL}?source=rework&month=${month}&year=${year}&callback=${cbName}`;
    document.head.appendChild(script);
  });
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function signal(r) {
  if (r >= 80) return '<span class="badge badge-g">strong</span>';
  if (r >= 60) return '<span class="badge badge-b">ok</span>';
  if (r >= 40) return '<span class="badge badge-a">watch</span>';
  return '<span class="badge badge-r">at risk</span>';
}
function pct(n, t) { return t > 0 ? Math.round(n / t * 100) : 0; }
function cc(r) { return r >= 75 ? 'hi' : r < 50 ? 'lo' : ''; }
function abbr(s) {
  return s.replace('Fortis Disability (Initial)','FD Initial')
          .replace('Fortis Disability NPWR (Initial) VAI','FD NPWR VAI')
          .replace('Fortis Disability NPWR','FD NPWR')
          .replace('Fortis Disability','FD')
          .replace('Milberg Grossman','MG');
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(data) {
  const { meta, summary, ops, weekly, topReasons, agentBreakdown, firmBreakdown } = data;
  const now = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-left">
        <h1>Rework operations dashboard</h1>
        <div class="sub">All law firms · Raw tab live · auto-filters to current month</div>
      </div>
      <div class="header-right">
        <span class="month-badge">${meta.monthName} ${meta.year}</span>
        <button class="refresh-btn" onclick="init()">
          <svg fill="none" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5M4 9a9 9 0 0115-3M20 15a9 9 0 01-15 3"/></svg>
          Refresh
        </button>
        <span class="last-updated">Updated ${now}</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="kpi-row">
      <div class="kpi blue"><div class="kpi-label">Total reworks</div><div class="kpi-value">${summary.total}</div><div class="kpi-sub">Col G = Rework · ${meta.monthName}</div></div>
      <div class="kpi green"><div class="kpi-label">Converted → approved</div><div class="kpi-value">${summary.approved}</div><div class="kpi-sub">${summary.approvalRate}% terminal approval rate</div></div>
      <div class="kpi red"><div class="kpi-label">Rejected</div><div class="kpi-value">${summary.rejected}</div><div class="kpi-sub">${summary.rejectionRate}% terminal rejection rate</div></div>
      <div class="kpi amber"><div class="kpi-label">Still open</div><div class="kpi-value">${summary.open}</div><div class="kpi-sub">${pct(summary.open, summary.total)}% in-flight</div></div>
    </div>

    <div class="ops-row">
      <div class="ops-card">
        <div class="ops-icon purple"><svg fill="none" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 6v6l4 2"/></svg></div>
        <div class="ops-info purple">
          <div class="label">Avg time to pick up</div>
          <div class="value">${ops.avgTimeToPickupDays !== null ? ops.avgTimeToPickupDays + ' days' : '—'}</div>
          <div class="sub">Col D · Ops rework tab${ops.sampleSize.pickup > 0 ? ' · ' + ops.sampleSize.pickup + ' cases' : ' · pending data'}</div>
        </div>
      </div>
      <div class="ops-card">
        <div class="ops-icon teal"><svg fill="none" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg></div>
        <div class="ops-info teal">
          <div class="label">Avg dials per rework</div>
          <div class="value">${ops.avgDials !== null ? ops.avgDials : '—'}</div>
          <div class="sub">Col E · Ops rework tab${ops.sampleSize.dials > 0 ? ' · ' + ops.sampleSize.dials + ' cases' : ' · pending data'}</div>
        </div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">Weekly breakdown — Col H outcomes</div>
        <table class="wtable">
          <thead><tr><th>Week</th><th>Total</th><th>Approved</th><th>Rejected</th><th>Open</th><th>Signal</th></tr></thead>
          <tbody>
            ${weekly.map(w => `<tr>
              <td>W${w.week}</td><td>${w.total}</td>
              <td class="${cc(w.approvalRate)}">${w.approved} <span style="color:var(--muted);font-weight:400">(${w.approvalRate}%)</span></td>
              <td class="${w.rejectionRate > 30 ? 'lo' : ''}">${w.rejected} <span style="color:var(--muted);font-weight:400">(${w.rejectionRate}%)</span></td>
              <td class="${w.open > 3 ? 'wa' : ''}">${w.open}</td>
              <td>${signal(w.approvalRate)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="card">
        <div class="card-title">Weekly volume trend</div>
        <div class="chart-wrap"><canvas id="weeklyChart"></canvas></div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">Top error reasons — Col K to O</div>
        <div id="reasons-bars"></div>
      </div>
      <div class="card">
        <div class="card-title">Outcome by law firm</div>
        <div class="chart-wrap"><canvas id="firmChart"></canvas></div>
      </div>
    </div>

    <div style="padding:12px 28px 0">
      <div class="card">
        <div class="card-title">Agent breakdown — ${meta.monthName} reworks</div>
        <table class="atable">
          <thead><tr><th>Agent</th><th>Total</th><th>Approved</th><th>Rejected</th><th>Approval rate</th></tr></thead>
          <tbody>
            ${agentBreakdown.map(a => `<tr>
              <td>${a.agent}</td><td>${a.total}</td>
              <td style="color:var(--green)">${a.approved}</td>
              <td style="color:${a.rejected > 0 ? 'var(--red)' : 'var(--muted)'}">${a.rejected}</td>
              <td><div class="rate-bar">
                <div class="rate-track"><div class="rate-fill" style="width:${a.approvalRate}%;background:${a.approvalRate >= 75 ? 'var(--green)' : a.approvalRate >= 50 ? 'var(--amber)' : 'var(--red)'}"></div></div>
                <span style="font-size:12px;font-weight:500;min-width:34px;color:${a.approvalRate >= 75 ? 'var(--green)' : a.approvalRate >= 50 ? 'var(--amber)' : 'var(--red)'}">${a.approvalRate}%</span>
              </div></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="footer">Live data · Raw tab + Ops rework tab · Auto-filters to current month · Last fetched ${new Date(meta.generatedAt).toLocaleString('en-IN', {timeZone:'Asia/Kolkata'})} IST</div>
  `;

  // Weekly stacked bar
  new Chart(document.getElementById('weeklyChart'), {
    type: 'bar',
    data: {
      labels: weekly.map(w => 'W' + w.week),
      datasets: [
        { label: 'Approved', data: weekly.map(w => w.approved), backgroundColor: 'rgba(45,212,160,.75)', borderRadius: 4, stack: 's' },
        { label: 'Rejected', data: weekly.map(w => w.rejected), backgroundColor: 'rgba(240,91,91,.75)', borderRadius: 4, stack: 's' },
        { label: 'Open',     data: weekly.map(w => w.open),     backgroundColor: 'rgba(245,166,35,.5)',  borderRadius: 4, stack: 's' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#8892a4', font: { size: 11 }, boxWidth: 12 } } },
      scales: {
        x: { stacked: true, grid: { color: 'rgba(42,47,66,.5)' }, ticks: { color: '#8892a4' }, border: { display: false } },
        y: { stacked: true, grid: { color: 'rgba(42,47,66,.5)' }, ticks: { color: '#8892a4' }, border: { display: false } }
      }
    }
  });

  // Reasons bars
  const maxR = topReasons[0]?.count || 1;
  const bColors = ['#4f8ef7','#2dd4a0','#f5a623','#f05b5b','#9b7ff4','#4f8ef7','#2dd4a0','#f5a623'];
  document.getElementById('reasons-bars').innerHTML = topReasons.slice(0, 8).map((r, i) => `
    <div class="bar-row">
      <div class="bar-label" title="${r.reason}">${r.reason}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(r.count/maxR*100)}%;background:${bColors[i%bColors.length]}"></div></div>
      <div class="bar-val">${r.count}</div>
    </div>`).join('');

  // Firm chart
  new Chart(document.getElementById('firmChart'), {
    type: 'bar',
    data: {
      labels: firmBreakdown.map(f => abbr(f.firm)),
      datasets: [
        { label: 'Approved', data: firmBreakdown.map(f => f.approved), backgroundColor: 'rgba(45,212,160,.75)', borderRadius: 4, stack: 's' },
        { label: 'Rejected', data: firmBreakdown.map(f => f.rejected), backgroundColor: 'rgba(240,91,91,.75)', borderRadius: 4, stack: 's' }
      ]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#8892a4', font: { size: 11 }, boxWidth: 12 } } },
      scales: {
        x: { stacked: true, grid: { color: 'rgba(42,47,66,.5)' }, ticks: { color: '#8892a4' }, border: { display: false } },
        y: { stacked: true, grid: { display: false }, ticks: { color: '#8892a4', font: { size: 11 } }, border: { display: false } }
      }
    }
  });
}

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  document.getElementById('app').innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">Fetching live data...</div></div>`;
  try {
    const now = new Date();
    const data = await fetchData(now.getMonth() + 1, now.getFullYear());
    if (data.error) throw new Error(data.error);
    render(data);
  } catch (err) {
    document.getElementById('app').innerHTML = `<div class="error-box"><strong>Failed to load data</strong><br><br>${err.message}<br><br><small>Check the Apps Script deployment and try again.</small></div>`;
  }
}

init();
</script>
</body>
</html>
